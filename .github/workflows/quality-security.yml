name: Quality and Security

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

env:
  SONAR_PROJECT_KEY: brianohe21-pixel_poc_quality_security
  SONAR_ORGANIZATION: brianohe21-pixel

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  sonarcloud:
    name: SonarCloud
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate
        id: sonarqube-quality-gate-check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  snyk:
    name: Snyk
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high

  linear-sonar-failure:
    name: Linear Issue on Sonar Failure
    needs: sonarcloud
    if: failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Linear issue
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ vars.LINEAR_TEAM_ID }}
          TITLE: "[SonarCloud] Quality Gate failed — ${{ github.repository }} @ ${{ github.ref_name }}"
          DESCRIPTION: |
            SonarCloud quality gate failed for `${{ github.repository }}`.

            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - SonarCloud dashboard: https://sonarcloud.io/project/overview?id=${{ env.SONAR_PROJECT_KEY }}
          LABEL: sonarcloud
          PRIORITY: 2
        run: node scripts/create-linear-issue.mjs

  linear-snyk-failure:
    name: Linear Issue on Snyk Failure
    needs: snyk
    if: failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Linear issue
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ vars.LINEAR_TEAM_ID }}
          TITLE: "[Snyk] Vulnerabilities detected — ${{ github.repository }} @ ${{ github.ref_name }}"
          DESCRIPTION: |
            Snyk detected vulnerabilities in `${{ github.repository }}`.

            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Review the Snyk project in your Snyk organization dashboard.
          LABEL: snyk
          PRIORITY: 1
        run: node scripts/create-linear-issue.mjs
